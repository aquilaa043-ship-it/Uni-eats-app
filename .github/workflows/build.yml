name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Android Project
        run: |
          rm -rf android build .gradle
          # Cria e repara a estrutura de forma global para evitar incompatibilidade do Gradle
          flutter create .
          flutter pub get

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project Structure Clean
        run: |
          rm -rf ios build
          # O comando 'flutter create .' sem flags reconstrói o Runner.xcodeproj que estava faltando
          flutter create .
          flutter pub get

      - name: Configure CocoaPods with Frameworks
        run: |
          cd ios
          # Criamos o Podfile apontando para a estrutura gerada pelo Flutter
          echo "platform :ios, '14.0'" > Podfile
          echo "use_frameworks!" >> Podfile
          echo "target 'Runner' do" >> Podfile
          echo "  # Pods do Flutter" >> Podfile
          echo "end" >> Podfile
          
          pod repo update
          pod install

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
