name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Android Project
        run: |
          rm -rf android build .gradle
          flutter create .
          flutter pub get

      - name: Inject Scriptor Core repositories & SDK 34 into Gradle
        run: |
          cd android
          # Força todos os subprojetos (plugins) a usarem os repositórios da Google/Maven e o SDK 34
          echo -e "\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty('android')) {\n            project.android {\n                compileSdkVersion 34\n            }\n        }\n    }\n}" >> build.gradle
          cd ..

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project Structure Clean
        run: |
          rm -rf ios build
          flutter create .
          flutter pub get

      - name: Configure CocoaPods via Flutter CLI
        run: |
          cd ios
          # 1. Deixa o Flutter criar o Podfile original estável
          flutter build ios --config-only --simulator
          
          # 2. Injeta as dependências estáticas do Firebase na primeira linha sem quebrar o arquivo
          echo -e "platform :ios, '14.0'\nuse_frameworks! :linkage => :static\n\n$(cat Podfile)" > Podfile
          
          # 3. Limpeza profunda e instalação
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
