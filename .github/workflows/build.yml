name: Flutter Build & Export (Android & iOS)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Platform Projects
        run: |
          mkdir -p /tmp/backup
          cp android/app/src/main/AndroidManifest.xml /tmp/backup/AndroidManifest.xml
          # Recreate all standard build files for Android and iOS
          flutter create --platforms=android,ios --org com.aistudio .
          # Restore our custom manifest configuration
          cp /tmp/backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Configure Android Package Names
        run: python3 modify_android.py

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (IPA Unsigned)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Platform Projects
        run: |
          mkdir -p /tmp/backup
          cp ios/Runner/Info.plist /tmp/backup/Info.plist
          # Recreate all standard build files for Android and iOS
          flutter create --platforms=android,ios --org com.aistudio .
          # Restore our custom Info.plist configuration
          cp /tmp/backup/Info.plist ios/Runner/Info.plist

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate iOS Configuration Files
        run: flutter build ios --config-only

      - name: Configure iOS Podfile Target
        run: python3 modify_podfile.py

      - name: Build iOS (Sem assinatura para exportação)
        run: flutter build ios --release --no-codesign

      - name: Compress iOS Build (Payload para IPA)
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r UniEats.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-ipa
          path: assets/uni_eats_flutter/UniEats.ipa
