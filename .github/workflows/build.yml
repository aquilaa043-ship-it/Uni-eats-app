name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Recreate Android Project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.aistudio .
          flutter pub get
          flutter clean

      - name: Force Android SDK 34 for Firebase
        run: |
          cd android/app
          cat build.gradle | sed 's/compileSdk = .*/compileSdk = 34/g' | sed 's/compileSdkVersion .*/compileSdkVersion 34/g' > build.gradle.tmp
          mv build.gradle.tmp build.gradle
          cd ../..

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Configure CocoaPods and Inject Frameworks
        run: |
          cd ios
          # 1. Deixamos o Flutter gerar o Podfile oficial completo com todos os mapeamentos de plugins
          flutter build ios --config-only
          
          # 2. Injetamos cirurgicamente o 'use_frameworks!' e a plataforma 14 no topo do Podfile gerado
          sed -i '' "1s/^/platform :ios, '14.0'\nuse_frameworks!\n/" Podfile
          
          # 3. Limpeza profunda dos caches locais do CocoaPods
          rm -rf Pods TargetSupportFiles Podfile.lock
          pod cache clean --all
          pod repo update
          pod install --repo-update

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
