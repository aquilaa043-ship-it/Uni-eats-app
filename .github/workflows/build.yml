name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Android Project
        run: |
          rm -rf android build .gradle
          flutter create .
          flutter pub get

      - name: Force Android SDK 34 via local.properties
        run: |
          # Garante o SDK 34 injetando diretamente no arquivo de propriedades que o Gradle lê
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project Structure Clean
        run: |
          rm -rf ios build
          flutter create .
          flutter pub get

      - name: Configure CocoaPods with Native Linkage
        run: |
          cd ios
          # 1. Força o Flutter a gerar o Podfile oficial e completo com todos os plugins estruturados
          flutter build ios --config-only
          
          # 2. Injeta cirurgicamente as dependências dinâmicas no topo do Podfile nativo sem corrompê-lo
          ruby -e '
            content = File.read("Podfile")
            unless content.include?("use_frameworks!")
              content.gsub!("target \"Runner\" do", "platform :ios, \"14.0\"\nuse_frameworks! :linkage => :static\ntarget \"Runner\" do")
              File.open("Podfile", "w") { |f| f.write(content) }
            end
          '
          
          # 3. Instalação limpa dos pods linkando o Firebase
          pod repo update
          pod install

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
