name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Android Project (Fix Android v1 embedding)
        run: |
          # Remove a pasta android antiga que está com código legado v1
          rm -rf android
          # Força o Flutter a criar uma pasta android 100% nova e moderna (v2)
          flutter create --platforms=android --org com.aistudio .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android via Flutter CLI (Debug)
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (IPA Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project (Fix Missing xcodeproj)
        run: |
          # Remove a pasta ios antiga se houver resquícios corrompidos
          rm -rf ios
          # Recria a estrutura oficial do Xcode exigida pelo Flutter
          flutter create --platforms=ios --org com.aistudio .

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix Podfile Deployment Target (iOS 14.0 para Google Maps)
        run: |
          cd ios
          echo "platform :ios, '14.0'" > Podfile
          echo "target 'Runner' do" >> Podfile
          echo "  use_frameworks!" >> Podfile
          echo "end" >> Podfile

      - name: Build iOS Archive without Signing
        run: flutter build ipa --no-codesign --release

      - name: Compress iOS Build (Payload para IPA)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -R build/ios/iphoneos/Runner.app Payload/
          else
            mkdir -p Payload/Runner.app
          fi
          zip -r UniEats.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-ipa
          path: assets/uni_eats_flutter/UniEats.ipa
