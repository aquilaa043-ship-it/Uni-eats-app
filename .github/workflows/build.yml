name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Android Project
        run: |
          rm -rf android build .gradle
          flutter create .
          flutter pub get

      - name: Absolute Fix for Android Repositories and SDK 34
        run: |
          cd android
          
          # 1. Abre o settings.gradle e injeta google() e mavenCentral() no INÍCIO de cada bloco de repositórios nativo.
          # Isso impede o erro de 'Could not find androidx.lifecycle' ou qualquer dependência sumida do Firebase.
          perl -i -pe "s/repositories \x7b/repositories \x7b\n        google()\n        mavenCentral()/g" settings.gradle
          
          # 2. Força de forma absoluta todos os subprojetos e plugins a compilarem com o SDK 34 no build.gradle
          echo -e "\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty('android')) {\n            project.android {\n                compileSdkVersion 34\n            }\n        }\n    }\n}" >> build.gradle
          cd ..

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project Structure Clean
        run: |
          rm -rf ios build
          flutter create .
          flutter pub get

      - name: Force iOS 14.0 Deployment Target Globally
        run: |
          cd ios
          # Altera nativamente o Deployment Target interno do projeto Xcode de 13.0 para 14.0 (Resolve Google Maps)
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' Runner.xcodeproj/project.pbxproj
          
          if [ -f "Flutter/AppFrameworkInfo.plist" ]; then
            sed -i '' 's/<string>13.0<\/string>/<string>14.0<\/string>/g' Flutter/AppFrameworkInfo.plist
          fi
          cd ..

      - name: Configure CocoaPods with Static Linkage
        run: |
          cd ios
          # Gera o Podfile oficial baseado no projeto que agora já é nativamente iOS 14.0
          flutter build ios --config-only --simulator
          
          # Injeta o use_frameworks! necessário para o Firebase/Firestore funcionar estaticamente
          echo -e "use_frameworks! :linkage => :static\n$(cat Podfile)" > Podfile
          
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
