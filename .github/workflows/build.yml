yaml
name: Build & Export (Uni Eats Native)

on:
  push:
      branches:
            - main
                  - master
                    pull_request:
                        branches:
                              - main
                                    - master
                                      workflow_dispatch: 

                                      jobs:
                                        build-android:
                                            name: Build Android (APK)
                                                runs-on: ubuntu-latest
                                                    defaults:
                                                          run:
                                                                  working-directory: assets/uni_eats_flutter
                                                                      steps:
                                                                            - name: Checkout Repository
                                                                                    uses: actions/checkout@v4

                                                                                          - name: Set up Java
                                                                                                  uses: actions/setup-java@v4
                                                                                                          with:
                                                                                                                    distribution: 'zulu'
                                                                                                                              java-version: '17'

                                                                                                                                    - name: Grant Execute Permission to Gradle
                                                                                                                                            run: chmod +x android/gradlew || true

                                                                                                                                                  - name: Build Android APK (Release with Debug Fallback)
                                                                                                                                                          run: |
                                                                                                                                                                    cd android
                                                                                                                                                                              ./gradlew assembleRelease || ./gradlew assembleDebug

                                                                                                                                                                                    - name: Upload APK Artifact
                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                    with:
                                                                                                                                                                                                              name: uni-eats-android-apk
                                                                                                                                                                                                                        path: |
                                                                                                                                                                                                                                    assets/uni_eats_flutter/android/app/build/outputs/apk/release/*.apk
                                                                                                                                                                                                                                                assets/uni_eats_flutter/android/app/build/outputs/apk/debug/*.apk

                                                                                                                                                                                                                                                  build-ios:
                                                                                                                                                                                                                                                      name: Build iOS (IPA Unsigned)
                                                                                                                                                                                                                                                          runs-on: macos-latest
                                                                                                                                                                                                                                                              defaults:
                                                                                                                                                                                                                                                                    run:
                                                                                                                                                                                                                                                                            working-directory: assets/uni_eats_flutter
                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                      - name: Checkout Repository
                                                                                                                                                                                                                                                                                              uses: actions/checkout@v4

                                                                                                                                                                                                                                                                                                    - name: Set up Flutter
                                                                                                                                                                                                                                                                                                            uses: subosito/flutter-action@v2
                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                              channel: 'stable'
                                                                                                                                                                                                                                                                                                                                        cache: true

                                                                                                                                                                                                                                                                                                                                              - name: Clean and Prepare Flutter iOS
                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                flutter pub get || true
                                                                                                                                                                                                                                                                                                                                                                          flutter build ios --config-only --no-codesign

                                                                                                                                                                                                                                                                                                                                                                                - name: Build iOS Archive without Signing
                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                  flutter build ipa --no-codesign --release

                                                                                                                                                                                                                                                                                                                                                                                                        - name: Compress iOS Build (Payload para IPA)
                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                          mkdir -p Payload
                                                                                                                                                                                                                                                                                                                                                                                                                                    if [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
                                                                                                                                                                                                                                                                                                                                                                                                                                                          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      cp -R build/ios/iphoneos/Runner.app Payload/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Aviso: Runner.app estrutural padrão não gerado, tentando empacotamento genérico."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mkdir -p Payload/Runner.app
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            zip -r UniEats.ipa Payload

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Upload iOS Artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            name: uni-eats-ios-ipa
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      path: assets/uni_eats_flutter/UniEats.ipa
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      