name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Recreate Android Project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.aistudio .
          flutter pub get
          flutter clean

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Configure CocoaPods and Podfile
        run: |
          cd ios
          # Configura de forma limpa o Podfile com as exigências dos plugins nativos
          echo "platform :ios, '14.0'" > Podfile
          echo "target 'Runner' do" >> Podfile
          echo "  use_frameworks!" >> Podfile
          echo "end" >> Podfile
          
          # Limpeza profunda de caches antigos para forçar o Xcode a linkar o Firebase
          rm -rf Pods TargetSupportFiles Podfile.lock
          pod cache clean --all
          pod repo update
          pod install --repo-update

      - name: Build iOS for Simulator
        run: |
          # Compilação em modo simulador para saltar as travas do Development Team da Apple
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
