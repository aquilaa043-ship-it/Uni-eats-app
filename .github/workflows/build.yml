name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Recreate Android Project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.aistudio .
          flutter pub get
          flutter clean

      - name: Build Android via Flutter CLI (Debug)
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (IPA Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project
        run: |
          rm -rf ios
          flutter create --platforms=ios --org com.aistudio .
          flutter pub get

      - name: Configure CocoaPods and Podfile
        run: |
          cd ios
          echo "platform :ios, '14.0'" > Podfile
          echo "target 'Runner' do" >> Podfile
          echo "  use_frameworks!" >> Podfile
          echo "end" >> Podfile
          pod repo update
          pod install

      - name: Build iOS App Bundle (Forçando Ignorar Assinatura no CLI)
        run: |
          # Usamos o build ios em vez de ipa para o Xcode não exigir o Development Team na nuvem
          flutter build ios --release --no-codesign

      - name: Compress iOS Build (Empacotando .app em .ipa Manualmente)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -R build/ios/iphoneos/Runner.app Payload/
            zip -r UniEats.ipa Payload
          else
            echo "Erro crítico: O Flutter não gerou o Runner.app no caminho esperado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-ipa
          path: assets/uni_eats_flutter/UniEats.ipa
