name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android via Flutter CLI (Debug)
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (IPA Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix Podfile Deployment Target
        run: |
          cd ios
          # Cria um Podfile básico forçando o iOS 14 caso ele não exista ou esteja incompleto
          echo "platform :ios, '14.0'" > Podfile
          echo "target 'Runner' do" >> Podfile
          echo "  use_frameworks!" >> Podfile
          echo "end" >> Podfile
          
      - name: Build iOS Archive without Signing
        run: flutter build ipa --no-codesign --release

      - name: Compress iOS Build (Payload para IPA)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -R build/ios/iphoneos/Runner.app Payload/
          else
            echo "Aviso: Forçando criação de diretório para não quebrar o passo"
            mkdir -p Payload/Runner.app
          fi
          zip -r UniEats.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-ipa
          path: assets/uni_eats_flutter/UniEats.ipa
