name: "Build e Exportar Uni Eats Native"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: 

jobs:
  build-android:
    name: "Build Android (APK)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Android Project
        run: |
          rm -rf android build .gradle
          flutter create .
          flutter pub get

      - name: Force Monolithic Gradle Repositories & SDK 34
        run: |
          cd android
          
          # 1. Sobrescreve o build.gradle raiz forçando o Google e MavenCentral em nível global
          # Isso destrói o comportamento de escopo fechado que causou o erro 'Could not find androidx.lifecycle'
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  // Gerenciado dinamicamente pelo Flutter Plugin Loader
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                      }
                  }
              }
          }

          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # 2. Mantém o settings.gradle no padrão oficial estrito para carregar o motor do Flutter
          cat << 'EOF' > settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def propertiesFile = new File(settingsDir, "local.properties")
                  if (propertiesFile.exists()) {
                      propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  assert sdkPath != null, "Flutter SDK not found in local.properties"
                  return sdkPath
              }()

              includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
          }

          include ":app"
          EOF
          cd ..

      - name: Build Android via Flutter CLI (Debug Mode)
        run: |
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-android-apk
          path: assets/uni_eats_flutter/build/app/outputs/flutter-apk/*.apk

  build-ios:
    name: "Build iOS (Simulador Unsigned)"
    runs-on: macos-latest
    defaults:
      run:
        working-directory: assets/uni_eats_flutter
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate iOS Project Structure Clean
        run: |
          rm -rf ios build
          flutter create .
          flutter pub get

      - name: Force iOS 14.0 Deployment Target Globally
        run: |
          cd ios
          # Resolve o erro do Google Maps alterando o projeto Xcode base para target mínimo 14.0
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' Runner.xcodeproj/project.pbxproj
          
          if [ -f "Flutter/AppFrameworkInfo.plist" ]; then
            sed -i '' 's/<string>13.0<\/string>/<string>14.0<\/string>/g' Flutter/AppFrameworkInfo.plist
          fi
          cd ..

      - name: Configure CocoaPods with Post-Install Patch
        run: |
          cd ios
          flutter build ios --config-only --simulator
          
          # Sobrescreve o Podfile aplicando o patch pós-instalação para remover os símbolos de depuração inválidos (-G)
          cat << 'EOF' > Podfile
          platform :ios, '14.0'
          use_frameworks! :linkage => :static

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            
            def flutter_root
              generated_xcode_build_settings_path = File.expand_path('Flutter/generated_xcode_build_settings.mgmt', __dir__)
              unless File.exist?(generated_xcode_build_settings_path)
                raise "generated_xcode_build_settings.mgmt não encontrado."
              end
              File.foreach(generated_xcode_build_settings_path) do |line|
                matches = line.match(/FLUTTER_ROOT=(.+)/)
                return matches[1] if matches
              end
            end

            flutter_ios_podfile_setup_path = File.expand_path('packages/flutter_tools/bin/podhelper.rb', flutter_root)
            unless File.exist?(flutter_ios_podfile_setup_path)
              raise "podhelper.rb não encontrado em #{flutter_ios_podfile_setup_path}"
            end
            require flutter_ios_podfile_setup_path
            flutter_install_all_ios_pods File.dirname(__file__)
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target) if respond_to?(:flutter_additional_ios_build_settings)
              
              target.build_configurations.each do |config|
                # Força iOS 14 em todos os submódulos de terceiros do Podfile
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
                # Remove a geração de símbolos de debug obsoleta que injeta a flag proibida '-G'
                config.build_settings['GCC_GENERATE_DEBUGGING_SYMBOLS'] = 'NO'
              end
            end
          end
          EOF
          
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Build iOS for Simulator
        run: |
          flutter build ios --simulator --debug

      - name: Compress iOS Build (Payload para Simulator)
        run: |
          mkdir -p Payload
          if [ -d "build/ios/iphonesimulator/Runner.app" ]; then
            cp -R build/ios/iphonesimulator/Runner.app Payload/
            zip -r UniEats_Simulator.ipa Payload
          else
            echo "Erro crítico: O Runner.app do simulador não foi encontrado."
            exit 1
          fi

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-eats-ios-simulator
          path: assets/uni_eats_flutter/UniEats_Simulator.ipa
          
